// ============================================================
// SUPABASE API
// ============================================================
async function sbFetch(path, method, body){
  var opts = {
    method: method||'GET',
    headers: {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'}
  };
  if(body) opts.body = JSON.stringify(body);
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path, opts);
  if(!res.ok){ var t=await res.text(); throw new Error(t); }
  var ct = res.headers.get('content-type')||'';
  return ct.includes('json') ? res.json() : [];
}
async function sbGet(table){ 
  var sep = table.includes('?') ? '&' : '?';
  return sbFetch(table+sep+'select=*','GET'); 
}
async function sbUpsert(table, row){ return sbFetch(table,'POST',[row]); }  // with Prefer:resolution=merge-duplicates handled via headers below
async function sbUpsertReal(table, row){
  var opts = {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates,return=representation'}
  };
  opts.body = JSON.stringify([row]);
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+table, opts);
  if(!res.ok){ var t=await res.text(); throw new Error(t); }
  return [];
}
async function sbDelete(table, id){ return sbFetch(table+'?id=eq.'+id,'DELETE'); }

var loans = [];

// ── Sistema de Deshacer ──
var _undoStack = [];
var _MAX_UNDO = 10;

function snapshoot(descripcion){
  _undoStack.push({
    descripcion: descripcion,
    loans: JSON.parse(JSON.stringify(loans)),
    cuotaLoans: JSON.parse(JSON.stringify(cuotaLoans)),
    patrimonioBolsas: JSON.parse(JSON.stringify(patrimonioBolsas)),
    historialPrestamos: JSON.parse(JSON.stringify(historialPrestamos)),
    cajaInterna: JSON.parse(JSON.stringify(cajaInterna))
  });
  if(_undoStack.length>_MAX_UNDO) _undoStack.shift();
  _updateUndoBtn();
}

function _updateUndoBtn(){
  var btn=document.getElementById('undo-btn');
  if(!btn) return;
  if(_undoStack.length>0){
    var ultima=_undoStack[_undoStack.length-1];
    btn.disabled=false;
    btn.style.opacity='0.8';
    btn.style.cursor='pointer';
    btn.title='Deshacer: '+ultima.descripcion;
    btn.textContent='↩ '+ultima.descripcion;
  } else {
    btn.disabled=true;
    btn.style.opacity='0.3';
    btn.style.cursor='not-allowed';
    btn.title='Sin acciones para deshacer';
    btn.textContent='↩ Deshacer';
  }
}

async function undoAccion(){
  if(_undoStack.length===0) return;
  var estado=_undoStack.pop();
  loans=estado.loans;
  cuotaLoans=estado.cuotaLoans;
  patrimonioBolsas=estado.patrimonioBolsas;
  historialPrestamos=estado.historialPrestamos;
  cajaInterna=estado.cajaInterna;
  setSyncStatus('syncing');
  await saveLoans();
  await saveCuotaLoans();
  await savePatrimonio();
  await saveHistorial();
  await saveCajaInterna();
  _updateUndoBtn();
  refresh();
}

function setSyncStatus(state){
  var el = document.getElementById('sync-status');
  if(state==='ok'){ el.textContent='● Sincronizado'; el.className=''; el.style.cssText='font-size:12px;padding:3px 10px;border-radius:99px;background:#d1fae5;color:#1a7a4a;'; }
  else if(state==='syncing'){ el.textContent='↻ Guardando...'; el.style.cssText='font-size:12px;padding:3px 10px;border-radius:99px;background:#fef3c7;color:#92400e;'; }
  else { el.textContent='✕ Error al guardar'; el.style.cssText='font-size:12px;padding:3px 10px;border-radius:99px;background:#fee2e2;color:#b91c1c;'; }
}

function uid(){ return 'p_'+Date.now()+'_'+Math.floor(Math.random()*10000); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addMonths(dateStr,n){ if(!dateStr||dateStr==='-') return null; var d=new Date(dateStr+'T00:00:00'); if(isNaN(d.getTime())) return null; d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); }
function fmtMoney(n){ n=Math.round((n||0)*100)/100; return 'S/ '+n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s){ if(!s||s==='-') return '-'; var d=new Date(s+'T00:00:00'); if(isNaN(d.getTime())) return '-'; return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/(1000*60*60*24)); }

// ============================================================
// HISTORIAL DE CAPITAL
// ============================================================
function getHistorial(loan){ return (loan.historialCapital&&loan.historialCapital.length>0)?loan.historialCapital:[{fecha:loan.fechaInicio,saldo:loan.monto}]; }
function recomputeHistorial(loan){
  var ab=(loan.abonosCapital||[]).slice().sort(function(a,b){return a.fecha<b.fecha?-1:1;});
  var hist=[{fecha:loan.fechaInicio,saldo:loan.monto}],saldo=loan.monto;
  ab.forEach(function(a){ saldo=Math.max(0,saldo-a.monto); hist.push({fecha:a.fecha,saldo:saldo,abonoId:a.id,abonoMonto:a.monto}); });
  loan.historialCapital=hist; if(saldo===0) loan.estado='pagado'; return hist;
}
function saldoEnFecha(loan,fecha){ var h=getHistorial(loan),s=h[0].saldo; for(var i=0;i<h.length;i++){ if(h[i].fecha<=fecha) s=h[i].saldo; else break; } return s; }
function saldoActualDe(loan){ var h=getHistorial(loan); return h[h.length-1].saldo; }

// Devuelve el % de comisión vigente (último tramo aplicable a la cuota actual)
function comisionVigente(loan){
  var tramos=loan.comisionTramos;
  if(!tramos||tramos.length===0) return loan.comisionPct||0;
  var cuotaActual=(loan.pagos||[]).length+1;
  var ordenados=tramos.slice().sort(function(a,b){return b.desdeCuota-a.desdeCuota;});
  var aplicable=ordenados.find(function(t){return cuotaActual>=t.desdeCuota;});
  return aplicable?aplicable.pct:(loan.comisionPct||0);
}

// Devuelve el % de comisión aplicable a una cuota dada, considerando tramos
function getComisionPct(loan, numCuota){
  var tramos=loan.comisionTramos;
  if(!tramos||tramos.length===0) return loan.comisionPct||0;
  // Ordenar tramos por desdeCuota descendente y tomar el primero que aplique
  var aplicable=tramos.slice().sort(function(a,b){return b.desdeCuota-a.desdeCuota;})
    .find(function(t){return numCuota>=t.desdeCuota;});
  return aplicable?aplicable.pct:(loan.comisionPct||0);
}

// ============================================================
// CRONOGRAMAS
// ============================================================
function buildSchedule(loan){
  if(!loan.fechaInicio || !loan.monto || isNaN(loan.monto)) return [];
  try {
  var sch=[],today=todayISO(),m=0;
  while(true){ var nd=addMonths(loan.fechaInicio,m+1); if(!nd||(nd>today&&m>=(loan.pagos||[]).length)) break; m++; if(m>600||nd>today) break; }
  var total=Math.max(m,(loan.pagos||[]).length);
  total=Math.max(total,(loan.pagos||[]).length+1);
  for(var i=1;i<=total;i++){
    var due=addMonths(loan.fechaInicio,i),s=saldoEnFecha(loan,due);
    // Si saldo es 0 y no hay pago registrado para esta cuota, no generar más cuotas
    if(s<=0){
      var pagoCuota=(loan.pagos||[]).find(function(p){return p.cuota===i;});
      if(!pagoCuota) break;
    }
    var it=Math.round((s||0)*(loan.tasa||0)),com=Math.round(it*(getComisionPct(loan,i)/100));
    var pago=(loan.pagos||[]).find(function(p){return p.cuota===i;});
    sch.push({cuota:i,fechaVencimiento:due,saldo:s,interesTotal:it,comision:com,interesReal:it-com,pagado:pago?true:false,fechaPago:pago?pago.fecha:null});
  }
  return sch;
  } catch(e) { console.error('Error buildSchedule para', loan.nombre, e); return []; }
}
function buildCuotaSchedule(loan){
  var sch=[],cap=loan.monto/loan.numCuotas,saldo=loan.monto;
  for(var i=1;i<=loan.numCuotas;i++){
    var due=addMonths(loan.fechaInicio,i),int=Math.round(saldo*loan.tasa),c=Math.round(cap);
    if(i===loan.numCuotas) c=Math.round(saldo);
    var pago=(loan.pagos||[]).find(function(p){return p.cuota===i;});
    sch.push({cuota:i,fechaVencimiento:due,saldoAntes:Math.round(saldo),capital:c,interes:int,cuotaTotal:c+int,pagado:pago?true:false,fechaPago:pago?pago.fecha:null});
    saldo-=c;
  }
  return sch;
}
function loanStatus(loan){
  if(loan.estado==='pagado') return{label:'Pagado',color:'neutral'};
  var p=buildSchedule(loan).find(function(s){return !s.pagado;});
  if(!p) return{label:'Al día',color:'success'};
  if(todayISO()>p.fechaVencimiento) return{label:'Mora '+daysBetween(p.fechaVencimiento,todayISO())+'d',color:'danger'};
  return{label:'Al día',color:'success'};
}
function cuotaStatus(loan){
  if(loan.estado==='pagado') return{label:'Pagado',color:'neutral'};
  var p=buildCuotaSchedule(loan).find(function(s){return !s.pagado;});
  if(!p) return{label:'Completado',color:'success'};
  if(todayISO()>p.fechaVencimiento) return{label:'Mora '+daysBetween(p.fechaVencimiento,todayISO())+'d',color:'danger'};
  return{label:'Al día',color:'success'};
}
function loanTotals(loan){ var s=buildSchedule(loan),p=s.filter(function(x){return x.pagado;}); return{interesRealGenerado:p.reduce(function(a,x){return a+x.interesReal;},0),comisionTotal:p.reduce(function(a,x){return a+x.comision;},0),cuotasPagadas:p.length,cuotasTotal:s.length}; }
function cuotaTotals(loan){ var s=buildCuotaSchedule(loan),p=s.filter(function(x){return x.pagado;}); return{interesTotal:p.reduce(function(a,x){return a+x.interes;},0),cuotasPagadas:p.length,cuotasTotal:s.length}; }

      ctx.fillText(Math.round(val).toLocaleString('es-PE'),bar.x,bar.y-6); ctx.restore();
    });
  });
}};

// Helper: suma/resta interés neto a la bolsa Efectivo disponible
async function addInteresEfectivo(monto){
  var bol=patrimonioBolsas.find(function(b){return b.id==='bol_1';});

  await savePatrimonio();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(){
  var el=document.getElementById('view-dashboard');
  var filtro=el._filtro||'todos';
  var act=loans.filter(function(l){return l.estado!=='pagado';}),cuAct=cuotaLoans.filter(function(l){return l.estado!=='pagado';});

  // Filtrar según selección para métricas y gráficas
  var actF=act.filter(function(l){
    if(filtro==='todos'||filtro==='abierto') return true;
    if(filtro==='aldia') return loanStatus(l).color==='success';
    if(filtro==='mora') return loanStatus(l).color==='danger';
    if(filtro==='cuotas') return false;
    return true;
  });
  var cuActF=cuAct.filter(function(l){
    if(filtro==='todos'||filtro==='cuotas') return true;
    if(filtro==='aldia') return cuotaStatus(l).color==='success';
    if(filtro==='mora') return cuotaStatus(l).color==='danger';
    if(filtro==='abierto') return false;
    return true;
  });

  var capAb=actF.reduce(function(a,l){return a+saldoActualDe(l);},0);
  var capCu=cuActF.reduce(function(a,l){var sc=buildCuotaSchedule(l),p=sc.find(function(s){return !s.pagado;});return a+(p?p.saldoAntes:0);},0);
  var intN=0,comT=0,mora=0;
  actF.forEach(function(l){ try{var t=loanTotals(l);intN+=t.interesRealGenerado;comT+=t.comisionTotal;if(loanStatus(l).color==='danger')mora++;}catch(e){console.error('Error totales préstamo',l.nombre,e);} });
  cuActF.forEach(function(l){ try{intN+=cuotaTotals(l).interesTotal;if(cuotaStatus(l).color==='danger')mora++;}catch(e){console.error('Error totales cuota',l.nombre,e);} });

  var filtroLabel=filtro==='todos'?'':' · '+({'abierto':'Plazo abierto','cuotas':'En cuotas','aldia':'Al día','mora':'En mora'}[filtro]||'');
  var html='<div class="metric-grid">'+metricCard('Capital activo'+filtroLabel,fmtMoney(capAb+capCu))+metricCard('Interés neto generado'+filtroLabel,fmtMoney(intN))+metricCard('Comisión Rosa generada'+filtroLabel,fmtMoney(comT))+metricCard('Préstamos en mora'+filtroLabel,String(mora))+'</div>';

  if(act.length===0&&cuAct.length===0){ html+='<p style="color:var(--text-secondary)">No hay préstamos activos. Ve a "Nuevo a plazo" para empezar.</p>'; el.innerHTML=html; return; }

  if(actF.length>0 || cuActF.length>0){
    html+='<div class="two-col"><div><div class="chart-title">Saldo de capital por prestatario<span style="font-size:11px;color:var(--text-secondary);font-weight:400;">'+filtroLabel+'</span></div><div class="chart-wrap" style="height:280px;"><canvas id="chartCapital"></canvas></div></div>';
    html+='<div><div class="chart-title">Interés neto vs comisión acumulada<span style="font-size:11px;color:var(--text-secondary);font-weight:400;">'+filtroLabel+'</span></div><div class="chart-wrap" style="height:280px;"><canvas id="chartInteres"></canvas></div><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#1D9E75;"></div>Interés neto</div><div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>Comisión Rosa</div></div></div></div>';
  }
  html+='<div id="dash-cap-detail"></div>';

  // ── Resumen de préstamos activos ──
  function proximaFechaVenc(loan, tipo){
    if(tipo==='cuota'){var sch=buildCuotaSchedule(loan);var pend=sch.find(function(s){return !s.pagado;});return pend?pend.fechaVencimiento:null;}
    var pagos=loan.pagos||[];return addMonths(loan.fechaInicio, pagos.length+1);
  }
  function estadoConDias(loan, tipo){
    var st=tipo==='cuota'?cuotaStatus(loan):loanStatus(loan);
    if(st.color==='red') return st;
    if(st.color==='success'||st.label==='Al día'){var proxFecha=proximaFechaVenc(loan,tipo);if(proxFecha){var dias=daysBetween(todayISO(),proxFecha);return {label:'Al día - '+Math.max(0,dias)+'d',color:'success'};}}
    return st;
  }
  var rows=[];
  loans.filter(function(l){return l.estado!=='pagado';}).forEach(function(l){
    var st=estadoConDias(l,'abierto'),t=loanTotals(l);
    rows.push({tipo:'Plazo abierto',nombre:l.nombre,saldo:saldoActualDe(l),tasa:(l.tasa*100).toFixed(0)+'%',comision:comisionVigente(l)+'%',cuotas:t.cuotasPagadas+'/'+t.cuotasTotal,estado:st});
  });
  cuotaLoans.filter(function(l){return l.estado!=='pagado';}).forEach(function(l){
    var st=estadoConDias(l,'cuota'),t=cuotaTotals(l),sc=buildCuotaSchedule(l),p=sc.find(function(s){return !s.pagado;});
    rows.push({tipo:'En cuotas',nombre:l.nombre,saldo:p?p.saldoAntes:0,tasa:(l.tasa*100).toFixed(0)+'%',comision:'-',cuotas:t.cuotasPagadas+'/'+t.cuotasTotal,estado:st});
  });

  if(rows.length>0){
    var nAbierto=loans.filter(function(l){return l.estado!=='pagado';}).length;
    var nCuotas=cuotaLoans.filter(function(l){return l.estado!=='pagado';}).length;
    var nMora=rows.filter(function(r){return r.estado.color==='danger';}).length;
    var nAlDia=rows.filter(function(r){return r.estado.color==='success';}).length;
    function resBtn(key,label,n,color){
      var active=filtro===key;
      var COLORS={red:{bg:'#991b1b',border:'#ef4444',textI:'var(--text-danger)'},green:{bg:'#166534',border:'#22c55e',textI:'var(--text-success)'},blue:{bg:'#1d4ed8',border:'#3b82f6',textI:'var(--text)'}};
      var col=COLORS[color]||{bg:'#374151',border:'#6b7280',textI:'var(--text)'};
      return '<button class="res-filtro" data-key="'+key+'" style="padding:16px 24px;font-size:14px;font-weight:500;border-radius:var(--radius);border:2px solid '+(active?col.border:'var(--border)')+';background:'+(active?col.bg:'var(--bg-secondary)')+';color:'+(active?'#fff':col.textI)+';cursor:pointer;min-width:120px;text-align:center;transition:all .15s;">'+label+'<br><span style="font-size:28px;font-weight:700;display:block;margin-top:4px;">'+n+'</span></button>';
    }
    html+='<div style="margin-top:24px;"><div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;">';
    html+=resBtn('todos','Total',rows.length,'blue');
    html+=resBtn('abierto','Plazo abierto',nAbierto,'');
    html+=resBtn('cuotas','En cuotas',nCuotas,'');
    html+=resBtn('aldia','Al día',nAlDia,'green');
    html+=resBtn('mora','En mora',nMora,'red');
    html+='</div>';
    var rowsF=rows.filter(function(r){
      if(filtro==='todos') return true;
      if(filtro==='abierto') return r.tipo==='Plazo abierto';
      if(filtro==='cuotas') return r.tipo==='En cuotas';
      if(filtro==='aldia') return r.estado.color==='success';
      if(filtro==='mora') return r.estado.color==='danger';
      return true;
    });
    html+='<div style="overflow-x:auto;"><table><thead><tr><th>Tipo</th><th>Nombre</th><th>Saldo</th><th>Tasa</th><th>Comisión</th><th>Cuotas</th><th>Estado</th></tr></thead><tbody>';
    rowsF.forEach(function(r){html+='<tr><td style="color:var(--text-secondary);">'+r.tipo+'</td><td>'+r.nombre+'</td><td>'+fmtMoney(r.saldo)+'</td><td>'+r.tasa+'</td><td>'+r.comision+'</td><td>'+r.cuotas+'</td><td>'+badge(r.estado)+'</td></tr>';});
    if(rowsF.length===0) html+='<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);padding:20px;">Sin resultados.</td></tr>';
    html+='</tbody></table></div></div>';
  }

  el.innerHTML=html;

  // Combinar actF + cuActF para los charts (ya vienen filtrados)
  var chartAll = actF.map(function(l){return {nombre:l.nombre,capital:saldoActualDe(l),ir:loanTotals(l).interesRealGenerado,com:loanTotals(l).comisionTotal,status:loanStatus(l)};});
  cuActF.forEach(function(l){
    var sc=buildCuotaSchedule(l),p=sc.find(function(s){return !s.pagado;});
    chartAll.push({nombre:l.nombre,capital:p?p.saldoAntes:0,ir:cuotaTotals(l).interesTotal,com:0,status:cuotaStatus(l)});
  });

  if(chartAll.length>0){
    var labels=chartAll.map(function(x){return x.nombre;}),montos=chartAll.map(function(x){return x.capital;});
    setTimeout(function(){
    destroyChart('capital');
    charts.capital=new Chart(document.getElementById('chartCapital'),{type:'bar',data:{labels:labels,datasets:[{label:'Capital',data:montos,backgroundColor:chartAll.map(function(x){return x.status.color==='danger'?'#ef4444':'#378ADD';}),hoverBackgroundColor:'#5ab4ff'}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.label+': '+fmtMoney(c.raw);}}}},scales:{y:{beginAtZero:true,ticks:{color:'#8b92a9'}}},onClick:function(evt,els){if(!els||!els.length){var dd=document.getElementById('dash-cap-detail');if(dd)dd.innerHTML='';return;}var idx=els[0].index,item=chartAll[idx];var loan=act.find(function(l){return l.nombre===item.nombre;});if(!loan)return;var t=loanTotals(loan),saldo=saldoActualDe(loan),st=loanStatus(loan);var dd=document.getElementById('dash-cap-detail');if(!dd)return;dd.innerHTML='<div style="background:var(--bg);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 18px;margin-top:12px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="font-weight:600;font-size:15px;">'+loan.nombre+'</span><button id="dd-cap-close" style="font-size:12px;padding:3px 10px;">✕</button></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;font-size:13px;"><div><div style="color:var(--text-secondary);font-size:11px;">Capital activo</div><div style="font-weight:600;font-size:16px;">'+fmtMoney(saldo)+'</div></div><div><div style="color:var(--text-secondary);font-size:11px;">Tasa mensual</div><div style="font-weight:600;font-size:16px;">'+(loan.tasa*100).toFixed(0)+'%</div></div><div><div style="color:var(--text-secondary);font-size:11px;">Interés neto acum.</div><div style="font-weight:600;font-size:16px;color:var(--text-success);">'+fmtMoney(t.interesRealGenerado)+'</div></div><div><div style="color:var(--text-secondary);font-size:11px;">Comisión Rosa</div><div style="font-weight:600;font-size:16px;color:#EF9F27;">'+fmtMoney(t.comisionTotal)+'</div></div><div><div style="color:var(--text-secondary);font-size:11px;">Cuotas pagadas</div><div style="font-weight:600;font-size:16px;">'+t.cuotasPagadas+'/'+t.cuotasTotal+'</div></div><div><div style="color:var(--text-secondary);font-size:11px;">Estado</div><div style="margin-top:2px;">'+badge(st)+'</div></div></div></div>';document.getElementById('dd-cap-close').onclick=function(){dd.innerHTML='';};dd.scrollIntoView({behavior:'smooth',block:'nearest'});}},plugins:[valueLabelPlugin]});
    var ir=chartAll.map(function(x){return x.ir;}),co=chartAll.map(function(x){return x.com;});
    destroyChart('interes');
    charts.interes=new Chart(document.getElementById('chartInteres'),{type:'bar',data:{labels:labels,datasets:[{label:'Interés neto',data:ir,backgroundColor:'#1D9E75'},{label:'Comisión Rosa',data:co,backgroundColor:'#EF9F27'}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{display:false}},scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,ticks:{color:'#8b92a9'}}}},plugins:[valueLabelPlugin]});
    },50);
  }
  el.querySelectorAll('.res-filtro').forEach(function(b){
    b.onclick=function(){el._filtro=b.getAttribute('data-key');renderDashboard();};
  });
}

// ============================================================
// PRÉSTAMOS (PLAZO ABIERTO)
// ============================================================
function renderPrestamos(){
  var el=document.getElementById('view-prestamos');
  if(loans.length===0){el.innerHTML='<p style="color:var(--text-secondary);">No hay préstamos registrados.</p>';return;}
  var tabActivo=el._tab||'activos';
  el._tab=tabActivo;
  var activos=loans.filter(function(l){return l.estado!=='pagado';});
  var pagados=loans.filter(function(l){return l.estado==='pagado';});
  var lista=tabActivo==='activos'?activos:pagados;

  // Sub-tabs
  var html='<div style="display:flex;gap:8px;margin-bottom:16px;">';
  html+='<button class="prest-tab" data-tab="activos" style="padding:7px 18px;font-size:13px;font-weight:500;border-radius:var(--radius);border:'+(tabActivo==='activos'?'none':'1px solid var(--border)')+';background:'+(tabActivo==='activos'?'var(--accent)':'var(--bg-secondary)')+';color:'+(tabActivo==='activos'?'#fff':'var(--text-secondary)')+';cursor:pointer;">Activos ('+activos.length+')</button>';
  html+='<button class="prest-tab" data-tab="pagados" style="padding:7px 18px;font-size:13px;font-weight:500;border-radius:var(--radius);border:'+(tabActivo==='pagados'?'none':'1px solid var(--border)')+';background:'+(tabActivo==='pagados'?'var(--accent)':'var(--bg-secondary)')+';color:'+(tabActivo==='pagados'?'#fff':'var(--text-secondary)')+';cursor:pointer;">Pagados ('+pagados.length+')</button>';
  html+='</div>';

  if(lista.length===0){
    html+='<p style="color:var(--text-secondary);">'+( tabActivo==='activos'?'No hay préstamos activos.':'No hay préstamos pagados.')+'</p>';
    el.innerHTML=html;
    el.querySelectorAll('.prest-tab').forEach(function(b){b.onclick=function(){el._tab=b.getAttribute('data-tab');renderPrestamos();};});
    return;
  }

  lista.forEach(function(loan){
    var st=loanStatus(loan),sch=buildSchedule(loan),tot=loanTotals(loan),saldo=saldoActualDe(loan);
    var ab=(loan.abonosCapital||[]).slice().sort(function(a,b){return a.fecha<b.fecha?-1:1;});
    // Próximo vencimiento
    var proxInfo='';
    if(loan.estado!=='pagado'){
      var proxCuota=sch.find(function(s){return !s.pagado;});
      if(proxCuota){
        var diasProx=daysBetween(todayISO(),proxCuota.fechaVencimiento);
        var proxColor=diasProx<0?'var(--text-danger)':diasProx<=3?'#EF9F27':'var(--text-success)';
        proxInfo='<span style="font-size:12px;color:'+proxColor+';font-weight:500;">⏱ '+(diasProx<0?'Venció hace '+Math.abs(diasProx)+'d':diasProx===0?'Vence hoy':'Vence en '+diasProx+'d')+' ('+fmtDate(proxCuota.fechaVencimiento)+')</span>';
      }
    }
    html+='<div class="card"><div class="loan-header"><div><div class="loan-name">'+loan.nombre+'</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">Saldo '+fmtMoney(saldo)+' · '+(loan.tasa*100).toFixed(0)+'% mensual</div></div><div style="display:flex;gap:8px;align-items:center;">'+proxInfo+badge(st)+(loan.estado!=='pagado'?'<button class="edit-loan-btn" data-loan="'+loan.id+'" style="font-size:12px;padding:4px 10px;">✎ Editar</button>':'')+'</div></div>';
    var comVigente=comisionVigente(loan);
    var tieneTramos=(loan.comisionTramos&&loan.comisionTramos.length>0);
    html+='<div class="loan-meta"><span>Cuotas: '+tot.cuotasPagadas+'/'+tot.cuotasTotal+'</span><span>Inicio: '+fmtDate(loan.fechaInicio)+'</span><span class="comision-row">Comisión Rosa: <input type="number" class="comision-input" data-loan="'+loan.id+'" value="'+comVigente+'" style="width:58px;padding:4px;'+(tieneTramos?'opacity:0.5;':'')+'" '+(tieneTramos?'disabled title="Configurado por tramos — usa Editar para cambiar"':'')+' />%'+(tieneTramos?' <span style="font-size:10px;color:var(--text-secondary);">(tramos)</span>':'')+'</span></div>';
    if(ab.length>0){
      html+='<div class="abonos-section"><div class="sub-title">Pagos de capital registrados</div>';
      ab.forEach(function(a){html+='<div class="abono-row"><span>'+fmtMoney(a.monto)+' — '+fmtDate(a.fecha)+'</span><button class="editabono-btn" data-loan="'+loan.id+'" data-abono="'+a.id+'">Editar</button><button class="deleteabono-btn danger" data-loan="'+loan.id+'" data-abono="'+a.id+'">Eliminar</button></div>';});
      html+='</div>';
    }
    html+='<div class="scrollable"><table><thead><tr><th>Cuota</th><th>Vence</th><th>Int. total</th><th>Comisión</th><th>Int. neto</th><th>Estado</th></tr></thead><tbody>';
    sch.forEach(function(s){
      var mora=!s.pagado&&todayISO()>s.fechaVencimiento;
      html+='<tr><td>'+s.cuota+'</td><td>'+fmtDate(s.fechaVencimiento)+'</td><td>'+fmtMoney(s.interesTotal)+'</td><td>'+fmtMoney(s.comision)+'</td><td>'+fmtMoney(s.interesReal)+'</td><td>'+(s.pagado?'<button class="unpay-btn success-btn" data-loan="'+loan.id+'" data-cuota="'+s.cuota+'">✓ deshacer</button>':(mora?'<button class="pay-btn danger" data-loan="'+loan.id+'" data-cuota="'+s.cuota+'">Atrasado</button>':'<button class="pay-btn" data-loan="'+loan.id+'" data-cuota="'+s.cuota+'">Pagar</button>'))+'</td></tr>';
    });
    html+='</tbody></table></div><div class="actions">';
    if(loan.estado!=='pagado') html+='<button class="capital-btn" data-loan="'+loan.id+'">Registrar pago de capital</button><button class="close-btn" data-loan="'+loan.id+'">Cerrar préstamo</button>';
    else html+='<button class="reopen-btn" data-loan="'+loan.id+'">Reabrir préstamo</button>';
    html+='<button class="delete-btn danger" data-loan="'+loan.id+'">Eliminar</button></div></div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.pay-btn').forEach(function(btn){btn.onclick=async function(){
    var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;
    var numCuota=parseInt(btn.getAttribute('data-cuota'));
    var sch=buildSchedule(l);
    var cuotaItem=sch.find(function(s){return s.cuota===numCuota;});
    snapshoot('Pagar cuota '+numCuota+' — '+l.nombre);
    l.pagos=l.pagos||[];l.pagos.push({cuota:numCuota,fecha:todayISO()});
    if(cuotaItem) await addInteresEfectivo(cuotaItem.interesReal);
    await saveLoans();refresh();
  };});
  el.querySelectorAll('.unpay-btn').forEach(function(btn){btn.onclick=async function(){
    var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;
    var c=parseInt(btn.getAttribute('data-cuota'));
    var sch=buildSchedule(l);
    var cuotaItem=sch.find(function(s){return s.cuota===c;});
    snapshoot('Deshacer cuota '+c+' — '+l.nombre);
    l.pagos=(l.pagos||[]).filter(function(p){return p.cuota!==c;});
    if(cuotaItem) await addInteresEfectivo(-cuotaItem.interesReal);
    await saveLoans();refresh();
  };});
  el.querySelectorAll('.comision-input').forEach(function(inp){inp.onchange=async function(){
    var l=loans.find(function(x){return x.id===inp.getAttribute('data-loan');});
    if(!l)return;
    if(l.comisionTramos&&l.comisionTramos.length>0){return;}
    var v=parseFloat(inp.value);
    if(isNaN(v)) return;
    // Calcular diferencia de interés neto por cuotas ya pagadas
    var interesAntes=loanTotals(l).interesRealGenerado;
    l.comisionPct=v;
    var interesDespues=loanTotals(l).interesRealGenerado;
    var diff=interesDespues-interesAntes;
    if(diff!==0) await addInteresEfectivo(diff);
    await saveLoans();refresh();
  };});
  el.querySelectorAll('.prest-tab').forEach(function(b){b.onclick=function(){el._tab=b.getAttribute('data-tab');renderPrestamos();};});
  el.querySelectorAll('.edit-loan-btn').forEach(function(btn){btn.onclick=function(){
    var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;
    var box=document.getElementById('modal-box');
    box.innerHTML='<div class="modal-title">Editar préstamo — '+l.nombre+'</div><div class="modal-body">'+
      '<div class="form-group"><label>Nombre</label><input type="text" id="el-nombre" value="'+l.nombre+'" /></div>'+
      '<div class="form-group"><label>Monto original (S/)</label><input type="number" id="el-monto" value="'+l.monto+'" /></div>'+
      '<div class="form-group"><label>Tasa mensual (%)</label><input type="number" id="el-tasa" value="'+(l.tasa*100).toFixed(0)+'" /></div>'+
      '<div class="form-group"><label>Fecha de inicio</label><input type="date" id="el-fecha" value="'+l.fechaInicio+'" /></div>'+
      '<div class="form-group"><label>% Comisión Rosa (base)</label><input type="number" id="el-com" value="'+(l.comisionPct||0)+'" /></div>'+
      '<div class="form-group"><label style="display:flex;justify-content:space-between;">Tramos de comisión <button id="el-add-tramo" style="font-size:11px;padding:2px 8px;">+ Agregar tramo</button></label>'+
      '<div id="el-tramos-list" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;"></div>'+
      '<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Define % diferente desde cierta cuota. Ej: cuota 1→35%, cuota 18→30%</div></div>'+
      '</div><div class="modal-actions"><button id="mc">Cancelar</button><button id="mok" class="primary" style="padding:8px 20px;">Guardar cambios</button></div>';
    document.getElementById('modal-overlay').classList.add('open');

    // Renderizar tramos existentes
    var tramos=(l.comisionTramos||[]).slice().sort(function(a,b){return a.desdeCuota-b.desdeCuota;});
    function renderTramos(){
      var cont=document.getElementById('el-tramos-list');
      if(!cont) return;
      cont.innerHTML='';
      tramos.forEach(function(t,idx){
        var row=document.createElement('div');
        row.style.cssText='display:flex;gap:6px;align-items:center;';
        row.innerHTML='<span style="font-size:12px;color:var(--text-secondary);white-space:nowrap;">Desde cuota</span>'+
          '<input type="number" value="'+t.desdeCuota+'" style="width:60px;padding:4px;" data-idx="'+idx+'" class="tr-desde" />'+
          '<span style="font-size:12px;color:var(--text-secondary);">→</span>'+
          '<input type="number" value="'+t.pct+'" style="width:60px;padding:4px;" data-idx="'+idx+'" class="tr-pct" />'+
          '<span style="font-size:12px;color:var(--text-secondary);">%</span>'+
          '<button data-idx="'+idx+'" class="tr-del" style="font-size:11px;padding:2px 8px;background:var(--danger);color:#fff;border:none;border-radius:4px;cursor:pointer;">✕</button>';
        cont.appendChild(row);
      });
      cont.querySelectorAll('.tr-desde').forEach(function(inp){inp.oninput=function(){tramos[parseInt(inp.getAttribute('data-idx'))].desdeCuota=parseInt(inp.value)||1;};});
      cont.querySelectorAll('.tr-pct').forEach(function(inp){inp.oninput=function(){tramos[parseInt(inp.getAttribute('data-idx'))].pct=parseFloat(inp.value)||0;};});
      cont.querySelectorAll('.tr-del').forEach(function(btn){btn.onclick=function(){tramos.splice(parseInt(btn.getAttribute('data-idx')),1);renderTramos();};});
    }
    renderTramos();
    document.getElementById('el-add-tramo').onclick=function(){tramos.push({desdeCuota:1,pct:0});renderTramos();};

    document.getElementById('mc').onclick=closeModal;
    document.getElementById('mok').onclick=async function(){
      var nombre=document.getElementById('el-nombre').value.trim();
      var montoNuevo=parseFloat(document.getElementById('el-monto').value);
      var tasa=parseFloat(document.getElementById('el-tasa').value);
      var fecha=document.getElementById('el-fecha').value;
      var com=parseFloat(document.getElementById('el-com').value)||0;
      if(!nombre||isNaN(tasa)||!fecha||isNaN(montoNuevo)){alert('Completa todos los campos.');return;}
      // Ajustar efectivo por diferencia de monto
      var diff=l.monto-montoNuevo;
      if(diff!==0) await addInteresEfectivo(diff);
      l.nombre=nombre; l.monto=montoNuevo; l.tasa=tasa/100; l.fechaInicio=fecha; l.comisionPct=com;
      l.comisionTramos=tramos.length>0?tramos.slice().sort(function(a,b){return a.desdeCuota-b.desdeCuota;}):[];
      recomputeHistorial(l);
      closeModal(); await saveLoans(); refresh();
    };
  };});
  el.querySelectorAll('.capital-btn').forEach(function(btn){btn.onclick=function(){var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;showInputModal('Saldo actual: '+fmtMoney(saldoActualDe(l))+'. Monto a abonar al capital:',async function(m,f){snapshoot('Abono capital '+fmtMoney(m)+' — '+l.nombre);l.abonosCapital=l.abonosCapital||[];l.abonosCapital.push({id:uid(),fecha:f,monto:m});recomputeHistorial(l);await addInteresEfectivo(m);await saveLoans();refresh();});};});
  el.querySelectorAll('.editabono-btn').forEach(function(btn){btn.onclick=function(){var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;var ab=(l.abonosCapital||[]).find(function(a){return a.id===btn.getAttribute('data-abono');});if(!ab)return;var montoAnterior=ab.monto;showEditAbonoModal(ab.monto,ab.fecha,async function(m,f){snapshoot('Editar abono — '+l.nombre);var diff=m-montoAnterior;ab.monto=m;ab.fecha=f;recomputeHistorial(l);await addInteresEfectivo(diff);await saveLoans();refresh();});};});
  el.querySelectorAll('.deleteabono-btn').forEach(function(btn){btn.onclick=function(){showConfirmModal('¿Eliminar este abono? Se recalculará el saldo.',async function(){var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;var ab=(l.abonosCapital||[]).find(function(a){return a.id===btn.getAttribute('data-abono');});var montoAbono=ab?ab.monto:0;snapshoot('Eliminar abono — '+l.nombre);l.abonosCapital=(l.abonosCapital||[]).filter(function(a){return a.id!==btn.getAttribute('data-abono');});if(l.estado==='pagado')l.estado='activo';recomputeHistorial(l);await addInteresEfectivo(-montoAbono);await saveLoans();refresh();});};});
  el.querySelectorAll('.close-btn').forEach(function(btn){btn.onclick=function(){
    var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});
    if(!l)return;
    showConfirmModal('¿Cerrar el préstamo de <b>'+l.nombre+'</b>? Se moverá al Historial con los datos actuales.',async function(){
    snapshoot('Cerrar préstamo — '+l.nombre);
    var sch=buildSchedule(l);
    var mesesCerrados=sch.filter(function(s){return s.pagado;}).length;
    var saldoRestante=saldoActualDe(l);
    historialPrestamos.push({id:'hist_'+Date.now(),nombre:l.nombre,fechaInicio:l.fechaInicio,fechaCierre:todayISO(),montoInicial:l.monto,tasa:l.tasa,meses:mesesCerrados,intTotalGenerado:loanTotals(l).interesRealGenerado,comisionTotal:loanTotals(l).comisionTotal,pagos:[],tipo:'historico'});
    await saveHistorial();
    if(saldoRestante>0) await addInteresEfectivo(saldoRestante);
    l.estado='pagado';
    await saveLoans();
    refresh();
    },'Sí, cerrar','primary','Confirmar cierre');
  };});
  el.querySelectorAll('.reopen-btn').forEach(function(btn){btn.onclick=function(){
    var l=loans.find(function(x){return x.id===btn.getAttribute('data-loan');});
    if(!l)return;
    showConfirmModal('¿Reabrir el préstamo de <b>'+l.nombre+'</b>?',async function(){
      snapshoot('Reabrir préstamo — '+l.nombre);
      var saldo=saldoActualDe(l);
      var interesNeto=loanTotals(l).interesRealGenerado;
      await addInteresEfectivo(-(saldo+interesNeto));
      l.estado='activo';
      await saveLoans();refresh();
    },'Sí, reabrir','primary','Confirmar reapertura');
  };});
  el.querySelectorAll('.delete-btn').forEach(function(btn){btn.onclick=function(){var lid=btn.getAttribute('data-loan'),l=loans.find(function(x){return x.id===lid;});showConfirmModal('¿Eliminar el préstamo de <b>'+(l?l.nombre:'')+'</b>? Esta acción no se puede deshacer.',async function(){
    snapshoot('Eliminar préstamo — '+(l?l.nombre:''));
    if(l&&l.estado!=='pagado'){var saldo=saldoActualDe(l);var interesNeto=loanTotals(l).interesRealGenerado;await addInteresEfectivo(saldo-interesNeto);}
    loans=loans.filter(function(x){return x.id!==lid;});
    await saveLoans();refresh();});};});
}

// ============================================================
function renderCuotas(){
  var el=document.getElementById('view-cuotas');
  if(cuotaLoans.length===0){el.innerHTML='<p style="color:var(--text-secondary);">No hay préstamos en cuotas registrados.</p>';return;}
  var tabActivo=el._tab||'activos';
  el._tab=tabActivo;
  var activos=cuotaLoans.filter(function(l){return l.estado!=='pagado';});
  var pagados=cuotaLoans.filter(function(l){return l.estado==='pagado';});
  var lista=tabActivo==='activos'?activos:pagados;

  var html='<div style="display:flex;gap:8px;margin-bottom:16px;">';
  html+='<button class="cuota-tab" data-tab="activos" style="padding:7px 18px;font-size:13px;font-weight:500;border-radius:var(--radius);border:'+(tabActivo==='activos'?'none':'1px solid var(--border)')+';background:'+(tabActivo==='activos'?'var(--accent)':'var(--bg-secondary)')+';color:'+(tabActivo==='activos'?'#fff':'var(--text-secondary)')+';cursor:pointer;">Activos ('+activos.length+')</button>';
  html+='<button class="cuota-tab" data-tab="pagados" style="padding:7px 18px;font-size:13px;font-weight:500;border-radius:var(--radius);border:'+(tabActivo==='pagados'?'none':'1px solid var(--border)')+';background:'+(tabActivo==='pagados'?'var(--accent)':'var(--bg-secondary)')+';color:'+(tabActivo==='pagados'?'#fff':'var(--text-secondary)')+';cursor:pointer;">Pagados ('+pagados.length+')</button>';
  html+='</div>';

  if(lista.length===0){
    html+='<p style="color:var(--text-secondary);">'+(tabActivo==='activos'?'No hay préstamos en cuotas activos.':'No hay préstamos en cuotas pagados.')+'</p>';
    el.innerHTML=html;
    el.querySelectorAll('.cuota-tab').forEach(function(b){b.onclick=function(){el._tab=b.getAttribute('data-tab');renderCuotas();};});
    return;
  }

  lista.forEach(function(loan){
    var st=cuotaStatus(loan),sch=buildCuotaSchedule(loan),tot=cuotaTotals(loan);
    // Próximo vencimiento cuotas
    var proxInfoC='';
    if(loan.estado!=='pagado'){
      var proxCuotaC=sch.find(function(s){return !s.pagado;});
      if(proxCuotaC){
        var diasProxC=daysBetween(todayISO(),proxCuotaC.fechaVencimiento);
        var proxColorC=diasProxC<0?'var(--text-danger)':diasProxC<=3?'#EF9F27':'var(--text-success)';
        proxInfoC='<span style="font-size:12px;color:'+proxColorC+';font-weight:500;">⏱ '+(diasProxC<0?'Venció hace '+Math.abs(diasProxC)+'d':diasProxC===0?'Vence hoy':'Vence en '+diasProxC+'d')+' ('+fmtDate(proxCuotaC.fechaVencimiento)+')</span>';
      }
    }
    html+='<div class="card"><div class="loan-header"><div><div class="loan-name">'+loan.nombre+'</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">Capital '+fmtMoney(loan.monto)+' en '+loan.numCuotas+' cuotas · '+(loan.tasa*100).toFixed(0)+'% mensual sobre saldo</div></div><div style="display:flex;gap:8px;align-items:center;">'+proxInfoC+badge(st)+(loan.estado!=='pagado'?'<button class="edit-cuota-btn" data-loan="'+loan.id+'" style="font-size:12px;padding:4px 10px;">✎ Editar</button>':'')+'</div></div>';
    html+='<div class="loan-meta"><span>Cuotas: '+tot.cuotasPagadas+'/'+tot.cuotasTotal+'</span><span>Inicio: '+fmtDate(loan.fechaInicio)+'</span></div>';
    html+='<div class="scrollable"><table><thead><tr><th>Cuota</th><th>Vence</th><th>Capital</th><th>Interés</th><th>Cuota total</th><th>Estado</th></tr></thead><tbody>';
    sch.forEach(function(s){var mora=!s.pagado&&todayISO()>s.fechaVencimiento;html+='<tr><td>'+s.cuota+'</td><td>'+fmtDate(s.fechaVencimiento)+'</td><td>'+fmtMoney(s.capital)+'</td><td>'+fmtMoney(s.interes)+'</td><td>'+fmtMoney(s.cuotaTotal)+'</td><td>'+(s.pagado?'<button class="unpaycuota-btn success-btn" data-loan="'+loan.id+'" data-cuota="'+s.cuota+'">✓ deshacer</button>':(mora?'<button class="paycuota-btn danger" data-loan="'+loan.id+'" data-cuota="'+s.cuota+'">Atrasado</button>':'<button class="paycuota-btn" data-loan="'+loan.id+'" data-cuota="'+s.cuota+'">Pagar</button>'))+'</td></tr>';});
    html+='</tbody></table></div><div class="actions">'+(loan.estado!=='pagado'?'<button class="closecuota-btn" data-loan="'+loan.id+'">Cerrar préstamo</button>':'<button class="reopencuota-btn" data-loan="'+loan.id+'">Reabrir préstamo</button>')+'<button class="deletecuota-btn danger" data-loan="'+loan.id+'">Eliminar</button></div></div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.cuota-tab').forEach(function(b){b.onclick=function(){el._tab=b.getAttribute('data-tab');renderCuotas();};});
  el.querySelectorAll('.paycuota-btn').forEach(function(btn){btn.onclick=function(){
    var l=cuotaLoans.find(function(x){return x.id===btn.getAttribute('data-loan');});
    if(!l)return;
    var numCuota=parseInt(btn.getAttribute('data-cuota'));
    var sch=buildCuotaSchedule(l);
    var cuotaItem=sch.find(function(s){return s.cuota===numCuota;});
    var defaultFecha=cuotaItem?cuotaItem.fechaVencimiento:todayISO();
    showDateModal('Registrar pago — Cuota '+numCuota+' de '+l.nombre, defaultFecha, async function(fecha){
      snapshoot('Pagar cuota '+numCuota+' — '+l.nombre);
      l.pagos=l.pagos||[];
      l.pagos.push({cuota:numCuota,fecha:fecha});
      if(cuotaItem) await addInteresEfectivo(cuotaItem.interes);
      if(l.pagos.length>=l.numCuotas) l.estado='pagado';
      await saveCuotaLoans();
      refresh();
    });
  };});
  el.querySelectorAll('.unpaycuota-btn').forEach(function(btn){btn.onclick=async function(){
    var l=cuotaLoans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;
    var c=parseInt(btn.getAttribute('data-cuota'));
    var sch=buildCuotaSchedule(l);
    var cuotaItem=sch.find(function(s){return s.cuota===c;});
    snapshoot('Deshacer cuota '+c+' — '+l.nombre);
    l.pagos=(l.pagos||[]).filter(function(p){return p.cuota!==c;});
    l.estado='activo';
    if(cuotaItem) await addInteresEfectivo(-cuotaItem.interes);
    await saveCuotaLoans();refresh();
  };});
  el.querySelectorAll('.closecuota-btn').forEach(function(btn){btn.onclick=function(){
    var l=cuotaLoans.find(function(x){return x.id===btn.getAttribute('data-loan');});
    if(!l)return;
    showConfirmModal('¿Cerrar el préstamo en cuotas de <b>'+l.nombre+'</b>?',async function(){
      snapshoot('Cerrar cuotas — '+l.nombre);
      var sc=buildCuotaSchedule(l);
      var capitalPendiente=sc.filter(function(s){return !s.pagado;}).reduce(function(a,s){return a+s.capital;},0);
      var tot=cuotaTotals(l);
      historialPrestamos.push({id:'hist_'+Date.now(),nombre:l.nombre+' (cuotas)',fechaInicio:l.fechaInicio,fechaCierre:todayISO(),montoInicial:l.monto,tasa:l.tasa,meses:l.numCuotas,intTotalGenerado:tot.interesTotal,comisionTotal:0,pagos:[],tipo:'cuotas'});
      await saveHistorial();
      if(capitalPendiente>0) await addInteresEfectivo(capitalPendiente);
      l.estado='pagado';
      await saveCuotaLoans();
      refresh();
    },'Sí, cerrar','primary','Confirmar cierre');
  };});
  el.querySelectorAll('.reopencuota-btn').forEach(function(btn){btn.onclick=function(){
    var l=cuotaLoans.find(function(x){return x.id===btn.getAttribute('data-loan');});
    if(!l)return;
    showConfirmModal('¿Reabrir el préstamo en cuotas de <b>'+l.nombre+'</b>?',async function(){
      snapshoot('Reabrir cuotas — '+l.nombre);
      var sc=buildCuotaSchedule(l);
      var capitalPendiente=sc.filter(function(s){return !s.pagado;}).reduce(function(a,s){return a+s.capital;},0);
      if(capitalPendiente>0) await addInteresEfectivo(-capitalPendiente);
      l.estado='activo';
      await saveCuotaLoans();refresh();
    },'Sí, reabrir','primary','Confirmar reapertura');
  };});
  el.querySelectorAll('.edit-cuota-btn').forEach(function(btn){btn.onclick=function(){
    var l=cuotaLoans.find(function(x){return x.id===btn.getAttribute('data-loan');});if(!l)return;
    var box=document.getElementById('modal-box');
    box.innerHTML='<div class="modal-title">Editar préstamo — '+l.nombre+'</div><div class="modal-body">'+
      '<div class="form-group"><label>Nombre</label><input type="text" id="ec-nombre" value="'+l.nombre+'" /></div>'+
      '<div class="form-group"><label>Tasa mensual (%)</label><input type="number" id="ec-tasa" value="'+(l.tasa*100).toFixed(0)+'" /></div>'+
      '<div class="form-group"><label>Fecha de inicio</label><input type="date" id="ec-fecha" value="'+l.fechaInicio+'" /></div>'+
      '<div class="form-group"><label>Número de cuotas</label><input type="number" id="ec-ncuotas" value="'+l.numCuotas+'" /></div>'+
      '</div><div class="modal-actions"><button id="mc">Cancelar</button><button id="mok" class="primary" style="padding:8px 20px;">Guardar cambios</button></div>';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('mc').onclick=closeModal;
    document.getElementById('mok').onclick=async function(){
      var nombre=document.getElementById('ec-nombre').value.trim();
      var tasa=parseFloat(document.getElementById('ec-tasa').value);
      var fecha=document.getElementById('ec-fecha').value;
      var ncuotas=parseInt(document.getElementById('ec-ncuotas').value);
      if(!nombre||isNaN(tasa)||!fecha||isNaN(ncuotas)){alert('Completa todos los campos.');return;}
      snapshoot('Editar cuotas — '+l.nombre);
      l.nombre=nombre; l.tasa=tasa/100; l.fechaInicio=fecha; l.numCuotas=ncuotas;
      closeModal(); await saveCuotaLoans(); refresh();
    };
  };});
  el.querySelectorAll('.deletecuota-btn').forEach(function(btn){btn.onclick=function(){var lid=btn.getAttribute('data-loan'),l=cuotaLoans.find(function(x){return x.id===lid;});showConfirmModal('¿Eliminar el préstamo en cuotas de <b>'+(l?l.nombre:'')+'</b>?',async function(){
    snapshoot('Eliminar cuotas — '+(l?l.nombre:''));
    if(l&&l.estado!=='pagado'){var sc=buildCuotaSchedule(l);var capitalPendiente=sc.filter(function(s){return !s.pagado;}).reduce(function(a,s){return a+s.capital;},0);var interesNeto=cuotaTotals(l).interesTotal;await addInteresEfectivo(capitalPendiente-interesNeto);}
    cuotaLoans=cuotaLoans.filter(function(x){return x.id!==lid;});await saveCuotaLoans();refresh();});};});
}

// HISTORIAL
// ============================================================
var _histState = {selYear:null, selMode:'mensual', selMes:null, filtroTexto:'', filtroAno:'', ds:'ambos'};

function _renderHistTabla(){
  // Solo re-renderiza la tabla sin tocar el gráfico ni el estado del input
  var el=document.getElementById('hist-tabla-wrap');
  if(!el) return;
  var ftxt=_histState.filtroTexto.toLowerCase();
  var fano=_histState.filtroAno;
  var histFiltrado=historialPrestamos.slice().sort(function(a,b){return (a.fechaInicio||'')<(b.fechaInicio||'')?-1:1;}).filter(function(h){
    if(ftxt&&!h.nombre.toLowerCase().includes(ftxt)) return false;
    if(fano&&(h.fechaInicio||'').slice(0,4)!==fano) return false;
    return true;
  });
  var html='';
  if(histFiltrado.length===0){html='<p style="color:var(--text-secondary);font-size:13px;">Sin resultados.</p>';}
  else{
    html='<div style="overflow-x:auto;"><table><thead><tr><th>Nombre</th><th>Inicio</th><th>Cierre</th><th style="text-align:center;">Meses</th><th>Capital</th><th style="text-align:center;">Tasa</th><th>Int. neto</th><th>Comisión</th></tr></thead><tbody>';
    histFiltrado.forEach(function(h){
      var mv=h.meses&&h.meses>0?Math.round(h.meses):'-';
      var tv=h.tasa&&h.tasa>0?((h.tasa*100).toFixed(0)+'%'):'-';
      html+='<tr><td>'+h.nombre+'</td><td>'+fmtDate(h.fechaInicio)+'</td><td>'+fmtDate(h.fechaCierre)+'</td><td style="text-align:center;">'+mv+'</td><td>'+fmtMoney(h.montoInicial)+'</td><td style="text-align:center;">'+tv+'</td><td style="color:var(--text-success);">'+fmtMoney(h.intTotalGenerado)+'</td><td>'+fmtMoney(h.comisionTotal)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  el.innerHTML=html;
}

function renderHistorial(){
  var el=document.getElementById('view-historial');
  if(!el) return;

  var allPayments=[];
  loans.forEach(function(loan){
    buildSchedule(loan).forEach(function(s){
      if(s.pagado&&s.fechaPago) allPayments.push({fecha:s.fechaPago,nombre:loan.nombre,intReal:s.interesReal,intRosa:s.comision,intTotal:s.interesTotal});
    });
  });
  historialPrestamos.forEach(function(h){
    if(h.pagos&&h.pagos.length>0){
      h.pagos.forEach(function(p){
        if(p.fecha&&p.intReal>0) allPayments.push({fecha:p.fecha,nombre:h.nombre,intReal:p.intReal,intRosa:p.intRosa||0,intTotal:p.intTotal||p.intReal});
      });
    } else if(h.intTotalGenerado>0&&h.fechaCierre){
      allPayments.push({fecha:h.fechaCierre,nombre:h.nombre,intReal:h.intTotalGenerado,intRosa:h.comisionTotal||0,intTotal:h.intTotalGenerado+(h.comisionTotal||0)});
    }
  });
  allPayments.sort(function(a,b){return a.fecha<b.fecha?-1:1;});

  var years=[...new Set(allPayments.map(function(p){return p.fecha.slice(0,4);}))].sort();
  if(!_histState.selYear) _histState.selYear=years.includes(new Date().getFullYear().toString())?new Date().getFullYear().toString():(years[years.length-1]||'2026');

  var isTodos=_histState.selYear==='TODOS';
  var filtered=isTodos?allPayments:allPayments.filter(function(p){return p.fecha.startsWith(_histState.selYear);});
  var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  var grouped={};
  if(isTodos){
    years.forEach(function(y){grouped[y]={label:y,intReal:0,intRosa:0,intTotal:0,n:0,payments:[]};});
    filtered.forEach(function(p){var k=p.fecha.slice(0,4);if(grouped[k]){grouped[k].intReal+=p.intReal;grouped[k].intRosa+=p.intRosa;grouped[k].intTotal+=p.intTotal;grouped[k].n++;grouped[k].payments.push(p);}});
  } else {
    for(var m=1;m<=12;m++){var k=_histState.selYear+'-'+(m<10?'0'+m:m);grouped[k]={label:meses[m-1],intReal:0,intRosa:0,intTotal:0,n:0,payments:[]};}
    filtered.forEach(function(p){var k=p.fecha.slice(0,7);if(grouped[k]){grouped[k].intReal+=p.intReal;grouped[k].intRosa+=p.intRosa;grouped[k].intTotal+=p.intTotal;grouped[k].n++;grouped[k].payments.push(p);}});
  }
  var gKeys=Object.keys(grouped);
  var totalInt=filtered.reduce(function(a,p){return a+p.intReal;},0);
  var totalRosa=filtered.reduce(function(a,p){return a+p.intRosa;},0);

  function dsBtn(key,label,color){
    var active=_histState.ds===key;
    return '<button class="hist-ds" data-ds="'+key+'" style="padding:5px 14px;font-size:12px;border-radius:var(--radius);border:1.5px solid '+(active?color:'var(--border)')+';background:'+(active?color+'33':'transparent')+';color:'+(active?color:'var(--text-secondary)')+';cursor:pointer;font-weight:'+(active?'600':'400')+';">'+label+'</button>';
  }
  var yearBtns='<button class="hist-year" data-year="TODOS" style="padding:5px 12px;font-size:12px;margin-right:4px;border-radius:var(--radius-sm);border:1px solid '+(isTodos?'#8b5cf6':'var(--border)')+';background:'+(isTodos?'#8b5cf6':'transparent')+';color:'+(isTodos?'#fff':'var(--text-secondary)')+';cursor:pointer;">TODOS</button>';
  yearBtns+=years.map(function(y){var a=y===_histState.selYear;return '<button class="hist-year" data-year="'+y+'" style="padding:5px 12px;font-size:12px;margin-right:4px;border-radius:var(--radius-sm);border:1px solid '+(a?'var(--accent)':'var(--border)')+';background:'+(a?'var(--accent)':'transparent')+';color:'+(a?'#fff':'var(--text-secondary)')+';cursor:pointer;">'+y+'</button>';}).join('');

  var html='<div class="metric-grid" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));">';
  html+=metricCard('Interés neto '+(isTodos?'total':_histState.selYear),fmtMoney(totalInt));
  html+=metricCard('Comisión Rosa '+(isTodos?'total':_histState.selYear),fmtMoney(totalRosa));
  html+=metricCard('Total bruto '+(isTodos?'total':_histState.selYear),fmtMoney(totalInt+totalRosa));
  html+=metricCard('Cobros registrados',String(filtered.length));
  html+='</div>';

  html+='<div class="card"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">';
  html+='<span style="font-size:13px;font-weight:500;">Período:</span>'+yearBtns;
  html+='<span style="margin-left:auto;display:flex;gap:6px;">';
  ['mensual','acumulado'].forEach(function(m){var a=_histState.selMode===m;html+='<button class="hist-mode" data-mode="'+m+'" style="font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid '+(a?'var(--accent)':'var(--border)')+';background:'+(a?'var(--accent)':'transparent')+';color:'+(a?'#fff':'var(--text-secondary)')+';cursor:pointer;">'+m.charAt(0).toUpperCase()+m.slice(1)+'</button>';});
  html+='</span></div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">';
  html+=dsBtn('interes','Solo interés neto','#1D9E75');
  html+=dsBtn('comision','Solo comisión Rosa','#EF9F27');
  html+=dsBtn('ambos','Interés neto + Comisión','#1D9E75');
  html+=dsBtn('total','Total bruto','#378ADD');
  html+='</div>';
  html+='<p style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">💡 Clic en una barra para ver detalle del período</p>';
  html+='<div style="position:relative;height:260px;margin-bottom:8px;"><canvas id="chartHistorial"></canvas></div>';
  html+='<div class="legend" id="hist-legend"></div>';

  if(_histState.selMes!==null&&grouped[_histState.selMes]){
    var g=grouped[_histState.selMes];
    html+='<div style="background:var(--bg);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-weight:600;font-size:14px;">📊 '+g.label+(isTodos?'':' '+_histState.selYear)+'</span><button id="hist-clear-sel" style="font-size:12px;padding:3px 10px;">✕ Cerrar</button></div>';
    html+='<table><thead><tr><th>Prestatario</th><th>Fecha pago</th><th>Interés neto</th><th>Comisión Rosa</th><th>Total</th></tr></thead><tbody>';
    g.payments.forEach(function(p){html+='<tr><td>'+p.nombre+'</td><td>'+fmtDate(p.fecha)+'</td><td>'+fmtMoney(p.intReal)+'</td><td>'+fmtMoney(p.intRosa)+'</td><td>'+fmtMoney(p.intTotal)+'</td></tr>';});
    html+='<tr style="font-weight:600;border-top:2px solid var(--border);"><td colspan="2">TOTAL</td><td>'+fmtMoney(g.intReal)+'</td><td>'+fmtMoney(g.intRosa)+'</td><td>'+fmtMoney(g.intTotal)+'</td></tr>';
    html+='</tbody></table></div>';
  }

  html+='<div style="overflow-x:auto;margin-bottom:0;"><table><thead><tr><th>Período</th><th>Interés neto</th><th>Comisión Rosa</th><th>Total bruto</th><th>Cobros</th></tr></thead><tbody>';
  gKeys.forEach(function(k){var g=grouped[k];if(g.intTotal>0) html+='<tr><td>'+g.label+(isTodos?'':' '+_histState.selYear)+'</td><td>'+fmtMoney(g.intReal)+'</td><td>'+fmtMoney(g.intRosa)+'</td><td>'+fmtMoney(g.intTotal)+'</td><td>'+g.n+'</td></tr>';});
  html+='</tbody></table></div></div>';

  // Tabla cerrados: filtros arriba, tabla en div separado
  var anosHist=[...new Set(historialPrestamos.map(function(h){return (h.fechaInicio||'').slice(0,4);}))].filter(Boolean).sort();
  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;"><div class="section-title" style="margin:0;">Préstamos cerrados ('+historialPrestamos.length+')</div>';
  html+='<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
  html+='<input type="text" id="hft" placeholder="Buscar nombre..." value="'+_histState.filtroTexto+'" style="width:160px;padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);" />';
  html+='<select id="hfa" style="padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);"><option value="">Todos los años</option>';
  anosHist.forEach(function(a){html+='<option value="'+a+'"'+(_histState.filtroAno===a?' selected':'')+'>'+a+'</option>';});
  html+='</select>';
  html+='<button id="btn-reseed-hist" title="Restaurar datos del historial" style="font-size:11px;padding:4px 10px;opacity:0.4;border:1px dashed var(--border);">⟳ Restaurar</button>';
  html+='</div></div>';
  html+='<div id="hist-tabla-wrap"></div></div>';

  el.innerHTML=html;

  // Poblar tabla sin re-renderizar el gráfico
  _renderHistTabla();

  // Bind: año/modo/ds → renderHistorial completo; texto → solo _renderHistTabla
  el.querySelectorAll('.hist-year').forEach(function(b){b.onclick=function(){_histState.selYear=b.getAttribute('data-year');_histState.selMes=null;renderHistorial();};});
  el.querySelectorAll('.hist-mode').forEach(function(b){b.onclick=function(){_histState.selMode=b.getAttribute('data-mode');renderHistorial();};});
  el.querySelectorAll('.hist-ds').forEach(function(b){b.onclick=function(){_histState.ds=b.getAttribute('data-ds');renderHistorial();};});
  var cs=document.getElementById('hist-clear-sel');
  if(cs) cs.onclick=function(){_histState.selMes=null;renderHistorial();};
  var hft=document.getElementById('hft');
  if(hft){
    hft.oninput=function(){_histState.filtroTexto=hft.value;_renderHistTabla();};
    // Mantener foco si ya estaba escribiendo
    if(_histState.filtroTexto) setTimeout(function(){var h=document.getElementById('hft');if(h){h.focus();h.setSelectionRange(h.value.length,h.value.length);}},10);
  }
  var hfa=document.getElementById('hfa');
  if(hfa){hfa.onchange=function(){_histState.filtroAno=hfa.value;_renderHistTabla();};}
  var btnReseed=document.getElementById('btn-reseed-hist');
  if(btnReseed){
    btnReseed.onclick=function(){
      showConfirmModal('¿Restaurar datos del historial desde el seed original? Esto sobreescribirá los datos actuales en Supabase.', async function(){
        setSyncStatus('syncing');
        try{
          historialPrestamos = seedHistorial();
          await saveHistorial();
          renderHistorial();
        }catch(e){ setSyncStatus('error'); console.error('Error reseed historial',e); }
      }, 'Sí, restaurar', 'primary', 'Confirmar restauración');
    };
  }

  // Gráfico
  var dataIR=gKeys.map(function(k){return Math.round(grouped[k].intReal);});
  var dataCom=gKeys.map(function(k){return Math.round(grouped[k].intRosa);});
  var dataTotal=gKeys.map(function(k){return Math.round(grouped[k].intReal+grouped[k].intRosa);});
  if(_histState.selMode==='acumulado'){
    var a1=0,a2=0,a3=0;
    dataIR=dataIR.map(function(v){a1+=v;return a1;});
    dataCom=dataCom.map(function(v){a2+=v;return a2;});
    dataTotal=dataTotal.map(function(v){a3+=v;return a3;});
  }
  var datasets=[];
  var legendHtml='';
  if(_histState.ds==='interes'){
    datasets=[{label:'Interés neto',data:dataIR,backgroundColor:'#1D9E75',borderRadius:3}];
    legendHtml='<div class="legend-item"><div class="legend-dot" style="background:#1D9E75;"></div>Interés neto</div>';
  } else if(_histState.ds==='comision'){
    datasets=[{label:'Comisión Rosa',data:dataCom,backgroundColor:'#EF9F27',borderRadius:3}];
    legendHtml='<div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>Comisión Rosa</div>';
  } else if(_histState.ds==='total'){
    datasets=[{label:'Total bruto',data:dataTotal,backgroundColor:'#378ADD',borderRadius:3}];
    legendHtml='<div class="legend-item"><div class="legend-dot" style="background:#378ADD;"></div>Total bruto</div>';
  } else {
    datasets=[{label:'Interés neto',data:dataIR,backgroundColor:'#1D9E75',borderRadius:3},{label:'Comisión Rosa',data:dataCom,backgroundColor:'#EF9F27',borderRadius:3}];
    legendHtml='<div class="legend-item"><div class="legend-dot" style="background:#1D9E75;"></div>Interés neto</div><div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>Comisión Rosa</div>';
  }
  document.getElementById('hist-legend').innerHTML=legendHtml;
  var stacked=_histState.ds==='ambos';
  destroyChart('historial');
  var ctx=document.getElementById('chartHistorial');
  if(ctx){
    charts.historial=new Chart(ctx,{type:'bar',data:{labels:gKeys.map(function(k){return grouped[k].label;}),datasets:datasets},
      options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:16}},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': S/ '+c.raw.toLocaleString('es-PE');}}}},
        scales:{x:{stacked:stacked,ticks:{color:'#8b92a9'}},y:{stacked:stacked,beginAtZero:true,ticks:{color:'#8b92a9'}}},
        onClick:function(evt,els){if(els&&els.length>0){var k=gKeys[els[0].index];_histState.selMes=(_histState.selMes===k?null:k);renderHistorial();}}
      },plugins:[valueLabelPlugin]});
  }
}

// ANÁLISIS — Rendimiento + Pronóstico
// ============================================================
function renderAnalisis(){
  var el=document.getElementById('view-analisis');
  if(!el) return;
  var seccion=el._seccion||'rendimiento';
  el._seccion=seccion;

  // ── Datos de rendimiento histórico ──
  // Agrupar todos los pagos de interés por mes (activos + historial)
  var pagosXMes={};
  function addPago(fecha,intReal,intRosa,nombre){
    if(!fecha||fecha==='-') return;
    var mes=fecha.slice(0,7); // YYYY-MM
    if(!pagosXMes[mes]) pagosXMes[mes]={intReal:0,intRosa:0,total:0,detalle:[]};
    pagosXMes[mes].intReal+=intReal;
    pagosXMes[mes].intRosa+=intRosa;
    pagosXMes[mes].total+=intReal+intRosa;
    pagosXMes[mes].detalle.push({nombre:nombre,intReal:intReal,intRosa:intRosa});
  }
  // Préstamos activos — cuotas pagadas
  loans.forEach(function(l){
    buildSchedule(l).filter(function(s){return s.pagado&&s.fechaPago;}).forEach(function(s){
      addPago(s.fechaPago,s.interesReal,s.comision,l.nombre);
    });
  });
  // Cuotas — pagadas
  cuotaLoans.forEach(function(l){
    buildCuotaSchedule(l).filter(function(s){return s.pagado&&s.fechaPago;}).forEach(function(s){
      addPago(s.fechaPago,s.interes,0,l.nombre);
    });
  });
  // Historial cerrado
  historialPrestamos.forEach(function(h){
    if(h.pagos&&h.pagos.length>0){
      h.pagos.forEach(function(p){if(p.fecha&&p.intReal>0) addPago(p.fecha,p.intReal,p.intRosa||0,h.nombre);});
    } else if(h.intTotalGenerado>0){
      // Si tiene meses definidos, distribuir mes a mes desde fechaInicio
      if(h.meses&&h.meses>0&&h.fechaInicio){
        var meses=Math.round(h.meses);
        var intXMes=Math.round((h.intTotalGenerado-(h.comisionTotal||0))/meses);
        var comXMes=Math.round((h.comisionTotal||0)/meses);
        for(var m=1;m<=meses;m++){
          var fMes=addMonths(h.fechaInicio,m);
          if(fMes) addPago(fMes,intXMes,comXMes,h.nombre);
        }
      } else if(h.fechaCierre){
        addPago(h.fechaCierre,h.intTotalGenerado-(h.comisionTotal||0),h.comisionTotal||0,h.nombre);
      }
    }
  });
  var mesesOrden=Object.keys(pagosXMes).sort();

  // ── Pronóstico ──
  // Para cada préstamo activo, proyectar cuotas futuras no pagadas
  var pronostico={}; // mes -> {intReal, intRosa, capital}
  var hoy=todayISO();
  function addPronostico(fecha,intReal,intRosa,capital,nombre){
    if(!fecha) return;
    // Incluir si: mes actual o futuro, O si es pasado pero la cuota no fue pagada (mora)
    var mes=fecha.slice(0,7);
    if(!pronostico[mes]) pronostico[mes]={intReal:0,intRosa:0,capital:0,detalle:[],vencida:false};
    pronostico[mes].intReal+=intReal;
    pronostico[mes].intRosa+=intRosa;
    pronostico[mes].capital+=capital;
    if(mes<hoy.slice(0,7)) pronostico[mes].vencida=true;
    pronostico[mes].detalle.push({nombre:nombre,intReal:intReal,capital:capital,fecha:fecha,vencida:mes<hoy.slice(0,7)});
  }
  loans.filter(function(l){return l.estado!=='pagado';}).forEach(function(l){
    buildSchedule(l).filter(function(s){return !s.pagado;}).forEach(function(s){
      addPronostico(s.fechaVencimiento,s.interesReal,s.comision,s.saldo,l.nombre);
    });
  });
  cuotaLoans.filter(function(l){return l.estado!=='pagado';}).forEach(function(l){
    buildCuotaSchedule(l).filter(function(s){return !s.pagado;}).forEach(function(s){
      addPronostico(s.fechaVencimiento,s.interes,0,s.capital,l.nombre+' (cuotas)');
    });
  });
  var mesActual=hoy.slice(0,7);
  // Incluir meses pasados si tienen cuotas vencidas pendientes, más los próximos 12 meses
  var mesesPron=Object.keys(pronostico).sort().filter(function(m){
    return m>=mesActual || pronostico[m].vencida;
  }).slice(0,12);

  // ── Métricas globales ──
  var totalIntReal=mesesOrden.reduce(function(a,m){return a+pagosXMes[m].intReal;},0);
  var totalIntRosa=mesesOrden.reduce(function(a,m){return a+pagosXMes[m].intRosa;},0);
  var mejorMes=mesesOrden.reduce(function(best,m){return pagosXMes[m].intReal>=(pagosXMes[best]||{intReal:0}).intReal?m:best;},mesesOrden[0]||'');
  var promedioMensual=mesesOrden.length>0?Math.round(totalIntReal/mesesOrden.length):0;
  var totalPronInt=mesesPron.reduce(function(a,m){return a+pronostico[m].intReal;},0);
  var totalPronCap=mesesPron.reduce(function(a,m){return a+pronostico[m].capital;},0);

  function fmtMes(m){ if(!m) return '-'; var p=m.split('-'); var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return meses[parseInt(p[1])-1]+' '+p[0]; }

  // ── HTML ──
  var html='<div style="display:flex;gap:8px;margin-bottom:20px;">';
  html+='<button class="analisis-sec" data-sec="rendimiento" style="padding:8px 20px;font-size:14px;font-weight:500;border-radius:var(--radius);border:2px solid '+(seccion==='rendimiento'?'var(--accent)':'var(--border)')+';background:'+(seccion==='rendimiento'?'var(--accent)':'var(--bg-secondary)')+';color:#fff;cursor:pointer;">📈 Rendimiento</button>';
  html+='<button class="analisis-sec" data-sec="pronostico" style="padding:8px 20px;font-size:14px;font-weight:500;border-radius:var(--radius);border:2px solid '+(seccion==='pronostico'?'var(--accent)':'var(--border)')+';background:'+(seccion==='pronostico'?'var(--accent)':'var(--bg-secondary)')+';color:#fff;cursor:pointer;">🔮 Pronóstico</button>';
  html+='</div>';

  if(seccion==='rendimiento'){
    if(mesesOrden.length===0){ html+='<p style="color:var(--text-secondary);">Aún no hay pagos registrados.</p>'; el.innerHTML=html; return; }
    html+='<div class="metric-grid">';
    html+=metricCard('Interés neto total cobrado',fmtMoney(totalIntReal));
    html+=metricCard('Comisión Rosa total',fmtMoney(totalIntRosa));
    html+=metricCard('Promedio mensual',fmtMoney(promedioMensual));
    html+=metricCard('Mejor mes',fmtMes(mejorMes)+' — '+fmtMoney(mejorMes?pagosXMes[mejorMes].intReal:0));
    html+='</div>';
    html+='<div class="card"><div class="section-title">Interés neto cobrado por mes</div><div class="chart-wrap" style="height:260px;"><canvas id="chartRendMes"></canvas></div></div>';
    // Tabla por prestatario
    var porPrestatario={};
    mesesOrden.forEach(function(m){
      pagosXMes[m].detalle.forEach(function(d){
        if(!porPrestatario[d.nombre]) porPrestatario[d.nombre]={intReal:0,intRosa:0,meses:0};
        porPrestatario[d.nombre].intReal+=d.intReal;
        porPrestatario[d.nombre].intRosa+=d.intRosa;
        porPrestatario[d.nombre].meses++;
      });
    });
    var ppRows=Object.keys(porPrestatario).sort(function(a,b){return porPrestatario[b].intReal-porPrestatario[a].intReal;});
    html+='<div class="card"><div class="section-title">Rendimiento por prestatario</div><div style="overflow-x:auto;"><table><thead><tr><th>Prestatario</th><th>Interés neto cobrado</th><th>Comisión Rosa</th><th>Total generado</th><th>% del total</th></tr></thead><tbody>';
    ppRows.forEach(function(n){
      var r=porPrestatario[n];

      html+='<tr><td><b>'+n+'</b></td><td style="color:var(--text-success);">'+fmtMoney(r.intReal)+'</td><td style="color:#EF9F27;">'+fmtMoney(r.intRosa)+'</td><td>'+fmtMoney(r.intReal+r.intRosa)+'</td><td><div style="display:flex;align-items:center;gap:6px;"><div style="background:var(--accent);height:6px;border-radius:3px;width:'+Math.round(parseFloat(pct))+'px;min-width:2px;"></div>'+pct+'%</div></td></tr>';
    });

  } else {

    html+=metricCard('Interés esperado próx. 3 meses',fmtMoney(mesPronFuturos.slice(0,3).reduce(function(a,m){return a+pronostico[m].intReal;},0)));
    html+=metricCard('Interés esperado próx. 12 meses',fmtMoney(mesPronFuturos.reduce(function(a,m){return a+pronostico[m].intReal;},0)));
    html+=metricCard('Capital a recuperar (12m)',fmtMoney(mesPronFuturos.reduce(function(a,m){return a+pronostico[m].capital;},0)));
    html+='</div>';
    html+='<div class="card"><div class="section-title">Proyección mensual de ingresos</div><div class="chart-wrap" style="height:260px;"><canvas id="chartPronMes"></canvas></div></div>';
    html+='<div class="card"><div class="section-title">Detalle mes a mes</div><div style="overflow-x:auto;"><table><thead><tr><th>Mes</th><th>Interés neto esperado</th><th>Capital a recuperar</th><th>Total a recibir</th></tr></thead><tbody>';
    mesesPron.forEach(function(m){
      var r=pronostico[m];
      var esProx=m===proxMes;

      html+='<tr class="pron-row" data-mes="'+m+'" style="cursor:pointer;'+(esProx?'background:rgba(55,138,221,0.08);':esVencido?'background:rgba(239,68,68,0.06);':'')+'">'+
        '<td><b>'+(esProx?'→ ':esVencido?'⚠ ':'')+fmtMes(m)+'</b>'+(esVencido?' <span style="font-size:10px;color:var(--text-danger);">mora pendiente</span>':'')+'</td>'+
        '<td style="color:var(--text-success);">'+fmtMoney(r.intReal)+'</td>'+
        '<td>'+fmtMoney(r.capital)+'</td>'+
        '<td style="font-weight:600;">'+fmtMoney(r.intReal+r.capital)+'</td></tr>';
      html+='<tr id="det-'+m+'" style="display:none;"><td colspan="4" style="padding:0;"></td></tr>';
    });
    html+='</tbody></table></div></div>';
  }

  el.innerHTML=html;
  el.querySelectorAll('.analisis-sec').forEach(function(b){
    b.onclick=function(){el._seccion=b.getAttribute('data-sec');renderAnalisis();};
  });
  if(seccion==='pronostico'){
    el.querySelectorAll('.pron-row').forEach(function(row){
      row.onclick=function(){
        var m=row.getAttribute('data-mes');
        var detRow=document.getElementById('det-'+m);
        if(!detRow) return;
        if(detRow.style.display!=='none'){detRow.style.display='none';return;}
        var r=pronostico[m];
        var inner='<td colspan="4" style="padding:8px 12px;background:var(--bg);"><div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600;">Préstamos incluidos en '+fmtMes(m)+':</div>';
        inner+='<table style="width:100%;font-size:12px;"><thead><tr><th style="text-align:left;padding:4px 8px;">Prestatario</th><th style="padding:4px 8px;">Vence</th><th style="padding:4px 8px;">Interés</th><th style="padding:4px 8px;">Capital</th></tr></thead><tbody>';
        r.detalle.forEach(function(d){
          inner+='<tr style="border-top:1px solid var(--border);">'+
            '<td style="padding:4px 8px;font-weight:500;">'+d.nombre+(d.vencida?' <span style="color:var(--text-danger);font-size:10px;">⚠ vencida</span>':'')+'</td>'+
            '<td style="padding:4px 8px;color:'+(d.vencida?'var(--text-danger)':'var(--text-secondary)')+';">'+fmtDate(d.fecha)+'</td>'+
            '<td style="padding:4px 8px;color:var(--text-success);">'+fmtMoney(d.intReal)+'</td>'+
            '<td style="padding:4px 8px;">'+fmtMoney(d.capital)+'</td></tr>';
        });
        inner+='</tbody></table></td>';
        detRow.innerHTML=inner;
        detRow.style.display='';
      };
    });
  }

  // Charts
  setTimeout(function(){
    if(seccion==='rendimiento'){
      destroyChart('rendMes');
      var ctx=document.getElementById('chartRendMes');
      if(!ctx) return;
      charts.rendMes=new Chart(ctx,{type:'bar',data:{labels:mesesOrden.map(fmtMes),datasets:[{label:'Interés neto',data:mesesOrden.map(function(m){return Math.round(pagosXMes[m].intReal);}),backgroundColor:'#1D9E75'},{label:'Comisión Rosa',data:mesesOrden.map(function(m){return Math.round(pagosXMes[m].intRosa);}),backgroundColor:'#EF9F27'}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{labels:{color:'#8b92a9'}}},scales:{x:{stacked:true,ticks:{color:'#8b92a9'}},y:{stacked:true,beginAtZero:true,ticks:{color:'#8b92a9'}}}}});
    } else {
      destroyChart('pronMes');
      var ctx2=document.getElementById('chartPronMes');
      if(!ctx2) return;
      charts.pronMes=new Chart(ctx2,{type:'bar',data:{labels:mesesPron.map(fmtMes),datasets:[{label:'Interés neto',data:mesesPron.map(function(m){return Math.round(pronostico[m].intReal);}),backgroundColor:'#378ADD'},{label:'Capital',data:mesesPron.map(function(m){return Math.round(pronostico[m].capital);}),backgroundColor:'rgba(55,138,221,0.25)'}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{labels:{color:'#8b92a9'}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+fmtMoney(c.raw);}}}},scales:{x:{stacked:true,ticks:{color:'#8b92a9'}},y:{stacked:true,beginAtZero:true,ticks:{color:'#8b92a9'}}}}});
    }
  },50);
}
