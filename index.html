function renderPatrimonio(){
  var el=document.getElementById('view-patrimonio');
  if(!el) return;

  var capPrest=loans.filter(function(l){return l.estado!=='pagado';}).reduce(function(a,l){return a+saldoActualDe(l);},0);
  var capCuotas=cuotaLoans.filter(function(l){return l.estado!=='pagado';}).reduce(function(a,l){var sc=buildCuotaSchedule(l),p=sc.find(function(s){return !s.pagado;});return a+(p?p.saldoAntes:0);},0);
  var totalPrest=capPrest+capCuotas;

  var bolsas=patrimonioBolsas||[];
  var totalBolsas=bolsas.reduce(function(a,b){return a+b.monto;},0);
  var totalPatrimonio=totalPrest+Math.max(0,totalBolsas);

  var iconos={efectivo:'💵',inversion:'📈',otro:'🔧'};
  var colores={efectivo:'#378ADD',inversion:'#1D9E75',otro:'#EF9F27'};

  var html='<div class="metric-grid">';
  html+=metricCard('Patrimonio total G&A',fmtMoney(totalPatrimonio));
  html+=metricCard('Capital en préstamos',fmtMoney(totalPrest));
  html+=metricCard('Efectivo e inversiones',fmtMoney(bolsas.filter(function(b){return b.monto>0;}).reduce(function(a,b){return a+b.monto;},0)));
  html+=metricCard('Deudas internas',fmtMoney(Math.abs(bolsas.filter(function(b){return b.monto<0;}).reduce(function(a,b){return a+b.monto;},0))));
  html+='</div>';

  html+='<div class="card"><div class="section-title">Distribución del capital</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;"><div style="position:relative;height:280px;"><canvas id="chartPatrimonio"></canvas></div><div>';

  // Bolsa préstamos (fija)
  var pct=totalPatrimonio>0?Math.round(totalPrest/totalPatrimonio*100):0;
  html+='<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"><div><span style="font-size:15px;margin-right:8px;">🤝</span><span style="font-weight:500;">Préstamos activos</span><div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">'+pct+'% del patrimonio</div></div><div style="font-size:17px;font-weight:600;">'+fmtMoney(totalPrest)+'</div></div>';

  bolsas.forEach(function(b){
    var bpct=totalPatrimonio>0&&b.monto>0?Math.round(b.monto/totalPatrimonio*100):0;
    html+='<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">';
    html+='<div><span style="font-size:15px;margin-right:8px;">'+(iconos[b.tipo]||'💼')+'</span><span style="font-weight:500;">'+b.nombre+'</span>';
    if(b.monto>0) html+='<div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">'+bpct+'% del patrimonio</div>';
    if(b.notas) html+='<div style="font-size:11px;color:var(--text-secondary);">'+b.notas+'</div>';
    html+='</div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:17px;font-weight:600;color:'+(b.monto<0?'var(--text-danger)':'')+'">'+fmtMoney(b.monto)+'</span>';
    html+='<button class="edit-bolsa-btn" data-id="'+b.id+'" style="font-size:11px;padding:3px 8px;">Editar</button>';
    html+='<button class="del-bolsa-btn" data-id="'+b.id+'" style="font-size:11px;padding:3px 8px;color:var(--text-danger);border-color:#fca5a5;background:var(--bg-danger);">✕</button>';
    html+='</div></div>';
  });

  html+='<div style="padding-top:12px;"><button id="add-bolsa-btn" style="font-size:13px;padding:6px 14px;">+ Agregar bolsa</button></div>';
  html+='</div></div></div>';

  el.innerHTML=html;

  // Chart dona
  var pieLabels=['Préstamos activos'].concat(bolsas.filter(function(b){return b.monto>0;}).map(function(b){return b.nombre;}));
  var pieData=[totalPrest].concat(bolsas.filter(function(b){return b.monto>0;}).map(function(b){return b.monto;}));
  var pieColors=['#3B5B92','#4FA36C','#EF9F27','#8b5cf6','#f43f5e','#06b6d4'];
  destroyChart('patrimonio');
  var ctx=document.getElementById('chartPatrimonio');
  if(ctx){charts.patrimonio=new Chart(ctx,{type:'doughnut',data:{labels:pieLabels,datasets:[{data:pieData,backgroundColor:pieColors,borderWidth:2,borderColor:'#1e2130'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom',labels:{color:'#e8eaf0',font:{size:12},padding:12}},tooltip:{callbacks:{label:function(c){var tot=c.dataset.data.reduce(function(a,b){return a+b;},0);var pct=tot>0?Math.round(c.raw/tot*100):0;return c.label+': '+fmtMoney(c.raw)+' ('+pct+'%)';}}}},},plugins:[{id:'pctLabel',afterDatasetsDraw:function(chart){var ctx2=chart.ctx,ds=chart.data.datasets[0],meta=chart.getDatasetMeta(0);var total=ds.data.reduce(function(a,b){return a+b;},0);meta.data.forEach(function(arc,i){if(!ds.data[i]||total===0)return;var pct=Math.round(ds.data[i]/total*100);if(pct<5)return;var angle=(arc.startAngle+arc.endAngle)/2,r=(arc.innerRadius+arc.outerRadius)/2;var x=arc.x+Math.cos(angle)*r,y=arc.y+Math.sin(angle)*r;ctx2.save();ctx2.fillStyle='#fff';ctx2.font='bold 12px sans-serif';ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText(pct+'%',x,y);ctx2.restore();});}}]});}

  function openBolsaModal(b){
    var box=document.getElementById('modal-box');
    var isNew=!b;
    b=b||{id:'bol_'+Date.now(),nombre:'',tipo:'efectivo',monto:0,fecha:todayISO(),notas:''};
    box.innerHTML='<div class="modal-title">'+(isNew?'Nueva bolsa de capital':'Editar bolsa')+'</div><div class="modal-body">'+
      '<div class="form-group"><label>Nombre</label><input type="text" id="eb-n" value="'+b.nombre+'" placeholder="Ej. Inversión en oro" /></div>'+
      '<div class="form-group"><label>Monto actual (S/) — negativo para deudas/salidas</label><input type="number" id="eb-m" value="'+b.monto+'" /></div>'+
      '<div class="form-group"><label>Tipo</label><select id="eb-t" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;background:var(--bg);color:var(--text);width:100%;"><option value="efectivo"'+(b.tipo==='efectivo'?' selected':'')+'>💵 Efectivo / Cuenta</option><option value="inversion"'+(b.tipo==='inversion'?' selected':'')+'>📈 Inversión</option><option value="otro"'+(b.tipo==='otro'?' selected':'')+'>🔧 Otro / Salida de caja</option></select></div>'+
      '<div class="form-group"><label>Notas</label><input type="text" id="eb-no" value="'+b.notas+'" placeholder="Descripción breve" /></div>'+
      '</div><div class="modal-actions"><button id="mc">Cancelar</button><button id="mok" class="primary" style="padding:8px 20px;">'+(isNew?'Agregar':'Guardar')+'</button></div>';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('mc').onclick=closeModal;
    document.getElementById('mok').onclick=async function(){
      var n=document.getElementById('eb-n').value.trim();
      if(!n)return;
      b.nombre=n; b.monto=parseFloat(document.getElementById('eb-m').value)||0;
      b.tipo=document.getElementById('eb-t').value; b.notas=document.getElementById('eb-no').value; b.fecha=todayISO();
      if(isNew) patrimonioBolsas.push(b);
      else{ var idx=patrimonioBolsas.findIndex(function(x){return x.id===b.id;}); if(idx>=0) patrimonioBolsas[idx]=b; }
      closeModal(); await savePatrimonio(); renderPatrimonio();
    };
  }

  el.querySelectorAll('.edit-bolsa-btn').forEach(function(btn){btn.onclick=function(){var b=patrimonioBolsas.find(function(x){return x.id===btn.getAttribute('data-id');});openBolsaModal(b);};});
  el.querySelectorAll('.del-bolsa-btn').forEach(function(btn){
    btn.onclick=function(){
      var bid=btn.getAttribute('data-id');
      var b=patrimonioBolsas.find(function(x){return x.id===bid;});
      showConfirmModal('¿Eliminar la bolsa <b>'+(b?b.nombre:'')+'</b>? Esta acción no se puede deshacer.',async function(){
        patrimonioBolsas=patrimonioBolsas.filter(function(x){return x.id!==bid;});
        await savePatrimonio(); renderPatrimonio();
      });
    };
  });
  document.getElementById('add-bolsa-btn').onclick=function(){openBolsaModal(null);};
}

// CAJA INTERNA
// ============================================================
function renderCajaInterna(){
  var el=document.getElementById('view-caja');
  if(!el) return;

  var persona=el._persona||'andrea';
  el._persona=persona;

  var data=cajaInterna[persona];
  var totalJunta=(data.saldo_junta||0)+(data.saldo_inicial_junta||0);
  var totalIntereses=(data.saldo_intereses||0)+(data.saldo_inicial_intereses||0);
  var totalDeuda=totalJunta+totalIntereses;

  var tabs=['andrea','gustavo'];
  var tabBtns=tabs.map(function(p){
    var active=p===persona;
    return '<button class="caja-persona" data-persona="'+p+'" style="padding:8px 20px;font-size:14px;font-weight:500;'+(active?'background:var(--accent);color:#fff;border-color:var(--accent);':'')+'">'+p.charAt(0).toUpperCase()+p.slice(1)+'</button>';
  }).join('');

  var html='<div style="display:flex;gap:8px;margin-bottom:20px;">'+tabBtns+'</div>';

  html+='<div class="metric-grid">';
  html+=metricCard('Deuda total '+persona.charAt(0).toUpperCase()+persona.slice(1),fmtMoney(totalDeuda));
  html+=metricCard('De junta',fmtMoney(totalJunta));
  html+=metricCard('De intereses',fmtMoney(totalIntereses));
  html+='</div>';

  function movTable(movs, tipo){
    var titulo=tipo==='junta'?'💰 Dinero de Junta':'📈 Dinero de Intereses';
    var h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="section-title" style="margin:0;">'+titulo+'</div><button class="add-mov-btn" data-tipo="'+tipo+'" style="font-size:12px;padding:5px 12px;">+ Registrar movimiento</button></div>';
    h+='<div style="overflow-x:auto;max-height:320px;overflow-y:auto;"><table><thead><tr><th>Fecha</th><th>Tipo</th><th>Monto</th><th>Motivo</th><th>Saldo</th><th></th></tr></thead><tbody>';
    movs.forEach(function(m,i){
      var tipo_mov=m.abono>0?'Abono':'Salida';
      var color=m.abono>0?'var(--text-success)':'var(--text-danger)';
      var monto=m.abono>0?m.abono:m.salida;
      h+='<tr><td>'+fmtDate(m.fecha)+'</td><td style="color:'+color+';font-weight:500;">'+tipo_mov+'</td><td style="color:'+color+';">'+(m.abono>0?'+':'-')+fmtMoney(monto)+'</td><td style="color:var(--text-secondary);">'+m.motivo+'</td><td>'+fmtMoney(m.saldo)+'</td>';
      h+='<td><button class="del-mov-btn" data-tipo="'+tipo+'" data-idx="'+i+'" style="font-size:11px;padding:2px 7px;color:var(--text-danger);border-color:#fca5a5;background:var(--bg-danger);">✕</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
    return h;
  }

  html+=movTable(data.junta||[], 'junta');
  html+=movTable(data.intereses||[], 'intereses');
  el.innerHTML=html;

  el.querySelectorAll('.caja-persona').forEach(function(b){b.onclick=function(){el._persona=b.getAttribute('data-persona');renderCajaInterna();};});

  el.querySelectorAll('.add-mov-btn').forEach(function(btn){
    btn.onclick=function(){
      var tipo=btn.getAttribute('data-tipo');
      var box=document.getElementById('modal-box');
      box.innerHTML='<div class="modal-title">Registrar movimiento — '+tipo+'</div><div class="modal-body">'+
        '<div class="form-group"><label>Tipo de movimiento</label><select id="mv-tipo" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;background:var(--bg);color:var(--text);width:100%;"><option value="salida">Salida (tomaron dinero de la caja)</option><option value="abono">Abono (devolvieron dinero)</option></select></div>'+
        '<div class="form-group"><label>Monto (S/)</label><input type="number" id="mv-monto" placeholder="0.00" /></div>'+
        '<div class="form-group"><label>Fecha</label><input type="date" id="mv-fecha" value="'+todayISO()+'" /></div>'+
        '<div class="form-group"><label>Motivo</label><input type="text" id="mv-motivo" placeholder="Ej. gym, ropa, pago deuda..." /></div>'+
        '</div><div class="modal-actions"><button id="mc">Cancelar</button><button id="mok" class="primary" style="padding:8px 20px;">Registrar</button></div>';
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('mc').onclick=closeModal;
      document.getElementById('mok').onclick=async function(){
        var tipoMov=document.getElementById('mv-tipo').value;
        var monto=parseFloat(document.getElementById('mv-monto').value)||0;
        var fecha=document.getElementById('mv-fecha').value;
        var motivo=document.getElementById('mv-motivo').value;
        if(!monto||!fecha)return;
        var lista=cajaInterna[persona][tipo]||[];
        var saldoAnterior=lista.length>0?lista[lista.length-1].saldo:0;
        var nuevoSaldo=tipoMov==='salida'?saldoAnterior+monto:Math.max(0,saldoAnterior-monto);
        lista.push({fecha:fecha,abono:tipoMov==='abono'?monto:0,salida:tipoMov==='salida'?monto:0,motivo:motivo,saldo:nuevoSaldo});
        cajaInterna[persona][tipo]=lista;
        if(tipo==='junta') cajaInterna[persona].saldo_junta=nuevoSaldo;
        else cajaInterna[persona].saldo_intereses=nuevoSaldo;
        // Conectar con bolsa Efectivo disponible
        if(tipoMov==='abono') await addInteresEfectivo(monto);
        else await addInteresEfectivo(-monto);
        closeModal(); await saveCajaInterna(); renderCajaInterna(); renderPatrimonio();
      };
    };
  });

  el.querySelectorAll('.del-mov-btn').forEach(function(btn){
    btn.onclick=function(){
      var tipo=btn.getAttribute('data-tipo');
      var idx=parseInt(btn.getAttribute('data-idx'));
      showConfirmModal('¿Eliminar este movimiento? El saldo se recalculará.',async function(){
        var lista=cajaInterna[persona][tipo]||[];
        var mov=lista[idx];
        // Revertir efecto en efectivo antes de eliminar
        if(mov){ if(mov.abono>0) await addInteresEfectivo(-mov.abono); else if(mov.salida>0) await addInteresEfectivo(mov.salida); }
        lista.splice(idx,1);
        // Recalcular saldos
        var saldo=0;
        lista.forEach(function(m){saldo=m.abono>0?saldo-m.abono:saldo+m.salida;m.saldo=Math.max(0,saldo);});
        cajaInterna[persona][tipo]=lista;
        if(tipo==='junta') cajaInterna[persona].saldo_junta=lista.length>0?lista[lista.length-1].saldo:0;
        else cajaInterna[persona].saldo_intereses=lista.length>0?lista[lista.length-1].saldo:0;
        await saveCajaInterna(); await savePatrimonio(); renderCajaInterna(); renderPatrimonio();
      });
    };
  });
}

function renderTab(t){
  if(t==='dashboard')renderDashboard();
  else if(t==='historial')renderHistorial();
  else if(t==='analisis')renderAnalisis();
  else if(t==='patrimonio')renderPatrimonio();
  else if(t==='caja')renderCajaInterna();
  else if(t==='prestamos')renderPrestamos();
  else if(t==='cuotas')renderCuotas();
  else if(t==='nuevo')renderNuevo();
  else if(t==='nuevocuota')renderNuevoCuota();
}
function refresh(){ ['dashboard','historial','analisis','patrimonio','prestamos','cuotas'].forEach(function(t){renderTab(t);}); }

function descargarBackup(){
  var backup={
    fecha:new Date().toISOString(),
    version:'v5',
    loans:loans,
    cuotaLoans:cuotaLoans,
    historialPrestamos:historialPrestamos,
    patrimonioBolsas:patrimonioBolsas,
    cajaInterna:cajaInterna
  };
  var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gestion-patrimonial-backup-'+todayISO()+'.json';
  a.click();
  localStorage.setItem('lastBackupDate',todayISO());
}

function checkBackupAlerta(){
  var ultima=localStorage.getItem('lastBackupDate');
  if(!ultima) return; // primera vez, no molestar
  var dias=daysBetween(ultima,todayISO());
  if(dias<7) return;
  var html='<div id="backup-banner" style="position:fixed;bottom:20px;right:16px;z-index:999;max-width:320px;background:#1d4ed8;border-radius:var(--radius);padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.5);">';
  html+='<div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:6px;">💾 Backup pendiente</div>';
  html+='<div style="font-size:12px;color:rgba(255,255,255,0.8);margin-bottom:10px;">Han pasado <b>'+dias+' días</b> desde tu último backup. Recomendamos descargar uno ahora.</div>';
  html+='<div style="display:flex;gap:8px;">';
  html+='<button onclick="descargarBackup();document.getElementById(\'backup-banner\').remove();" style="flex:1;padding:6px;font-size:12px;background:#fff;color:#1d4ed8;border:none;border-radius:4px;font-weight:600;cursor:pointer;">Descargar ahora</button>';
  html+='<button onclick="localStorage.setItem(\'lastBackupDate\',\''+todayISO()+'\');document.getElementById(\'backup-banner\').remove();" style="padding:6px 10px;font-size:12px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:4px;cursor:pointer;">Más tarde</button>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}

async function init(){
  try {
    await loadData();
  } catch(e) {
    console.error('Error en loadData:', e);
    document.getElementById('status-banner').textContent = 'Error cargando datos: ' + e.message;
    document.getElementById('status-banner').style.display = 'block';
  }
  try { renderDashboard(); } catch(e) { console.error('Error renderDashboard:', e); document.getElementById('view-dashboard').innerHTML = '<div style="color:var(--text-danger);padding:20px;">Error en Préstamos: ' + e.message + '</div>'; }
  
  try { renderPrestamos(); } catch(e) { console.error('Error renderPrestamos:', e); document.getElementById('view-prestamos').innerHTML = '<div style="color:var(--text-danger);padding:20px;">Error en Préstamos: ' + e.message + '</div>'; }
  try { renderCuotas(); } catch(e) { console.error('Error renderCuotas:', e); }
  try { renderAnalisis(); } catch(e) { console.error('Error renderAnalisis:', e); }
  try { renderNuevo(); } catch(e) { console.error('Error renderNuevo:', e); }
  try { renderNuevoCuota(); } catch(e) { console.error('Error renderNuevoCuota:', e); }

  // Registrar fecha de primera apertura si no existe
  if(!localStorage.getItem('lastBackupDate')) localStorage.setItem('lastBackupDate',todayISO());
  setTimeout(checkBackupAlerta, 1500);

  // Banner de alertas al abrir
  setTimeout(function(){
    var alertas=[];
    var hoy=todayISO();
    loans.filter(function(l){return l.estado!=='pagado';}).forEach(function(l){
      var sch=buildSchedule(l);
      var prox=sch.find(function(s){return !s.pagado;});
      if(!prox) return;
      var dias=daysBetween(hoy,prox.fechaVencimiento);
      if(dias<0) alertas.push({tipo:'mora',msg:'<b>'+l.nombre+'</b> — vencida hace '+Math.abs(dias)+'d ('+fmtDate(prox.fechaVencimiento)+')'});
      else if(dias<=3) alertas.push({tipo:'prox',msg:'<b>'+l.nombre+'</b> — vence en '+dias+'d ('+fmtDate(prox.fechaVencimiento)+')'});
    });
    cuotaLoans.filter(function(l){return l.estado!=='pagado';}).forEach(function(l){
      var sch=buildCuotaSchedule(l);
      var prox=sch.find(function(s){return !s.pagado;});
      if(!prox) return;
      var dias=daysBetween(hoy,prox.fechaVencimiento);
      if(dias<0) alertas.push({tipo:'mora',msg:'<b>'+l.nombre+' (cuotas)</b> — vencida hace '+Math.abs(dias)+'d ('+fmtDate(prox.fechaVencimiento)+')'});
      else if(dias<=3) alertas.push({tipo:'prox',msg:'<b>'+l.nombre+' (cuotas)</b> — vence en '+dias+'d ('+fmtDate(prox.fechaVencimiento)+')'});
    });
    if(alertas.length===0) return;
    var mora=alertas.filter(function(a){return a.tipo==='mora';});
    var prox=alertas.filter(function(a){return a.tipo==='prox';});
    var html='<div id="alerta-banner" style="position:fixed;top:60px;right:16px;z-index:999;max-width:340px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.4);">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-weight:600;font-size:13px;">📋 Alertas</span><button onclick="document.getElementById(\'alerta-banner\').remove()" style="font-size:12px;padding:2px 8px;">✕</button></div>';
    if(mora.length>0){
      html+='<div style="font-size:12px;color:var(--text-danger);font-weight:600;margin-bottom:4px;">En mora ('+mora.length+')</div>';
      mora.forEach(function(a){html+='<div style="font-size:12px;margin-bottom:3px;">'+a.msg+'</div>';});
    }
    if(prox.length>0){
      html+='<div style="font-size:12px;color:#EF9F27;font-weight:600;margin:'+(mora.length>0?'8px':0)+' 0 4px;">Próximos 3 días ('+prox.length+')</div>';
      prox.forEach(function(a){html+='<div style="font-size:12px;margin-bottom:3px;">'+a.msg+'</div>';});
    }
    html+='</div>';
    document.body.insertAdjacentHTML('beforeend',html);
  }, 800);
}

if(sessionStorage.getItem('auth')==='1') init();
